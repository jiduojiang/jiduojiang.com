<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Jiduo's Lab · jiduojiang.com</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Caveat:wght@500;700&family=Noto+Sans+SC:wght@500;700;900&family=ZCOOL+KuaiLe&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    /* default palette — overridden by Tweaks */
    --bg: #fbf5e6;          /* warm paper */
    --paper-line: #efe5cd;
    --ink: #2a2622;
    --ink-soft: #6a5f55;
    --c1: #ff6b6b;          /* tomato */
    --c2: #ffc83d;          /* sun */
    --c3: #4fb3f5;          /* sky */
    --c4: #61c97a;          /* leaf */
    --c5: #b67bff;          /* grape */
    --c6: #ff97c5;          /* bubble */
    --tape: rgba(255, 209, 102, .75);
    --shadow: 0 6px 0 rgba(42,38,34,.10), 0 14px 28px -10px rgba(42,38,34,.18);

    /* fonts */
    --f-display: "ZCOOL KuaiLe", "Fredoka", system-ui, sans-serif;
    --f-hand: "Caveat", "Fredoka", cursive;
    --f-body: "Fredoka", "Noto Sans SC", system-ui, sans-serif;
    --f-mono: "DM Mono", ui-monospace, monospace;
  }

  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:var(--f-body);}
  *{box-sizing:border-box}

  /* paper texture using gradient grid */
  body{
    background-image:
      radial-gradient(rgba(42,38,34,.045) 1px, transparent 1.2px),
      linear-gradient(180deg, rgba(255,255,255,.6), transparent 240px);
    background-size: 26px 26px, 100% 100%;
    background-position: 0 0, 0 0;
    min-height:100vh;
  }
  body.theme-blocks{
    background-image: none;
    background:
      linear-gradient(180deg, var(--bg), color-mix(in oklab, var(--bg), white 6%) 800px);
  }

  /* page width container */
  .page{ max-width: 1320px; margin: 0 auto; padding: 56px 56px 120px; }

  /* ── nav strip ─────────────────────────── */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom: 28px;
  }
  .brand{
    display:flex; align-items:center; gap:14px;
  }
  .brand-mark{
    width:54px; height:54px; border-radius:18px;
    background: var(--c2);
    display:grid; place-items:center;
    border: 3px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    transform: rotate(-4deg);
    font-family: var(--f-display);
    font-size: 28px; color: var(--ink);
  }
  .brand-name{
    font-family: var(--f-display);
    font-size: 26px; letter-spacing: .02em;
  }
  .brand-name .dot{ color: var(--c1); }
  .brand-sub{
    font-family: var(--f-mono);
    font-size: 11px; color: var(--ink-soft);
    margin-top: 2px; letter-spacing: .04em;
  }

  .nav-pills{ display:flex; gap:10px; }
  .pill{
    font-family: var(--f-body);
    font-weight:600;
    font-size: 15px;
    padding: 10px 16px;
    border-radius: 999px;
    border: 2px solid var(--ink);
    background: white;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .pill:hover{ transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .pill:active{ transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .pill.active{ background: var(--c3); color: white; }

  /* ── hero ──────────────────────────────── */
  .hero{
    display:grid; grid-template-columns: 1.3fr 1fr; gap: 40px;
    align-items: center;
    background: white;
    border: 3px solid var(--ink);
    border-radius: 28px;
    padding: 44px 48px;
    box-shadow: var(--shadow);
    position: relative;
    margin-bottom: 56px;
  }
  /* washi tape decorations */
  .tape{
    position:absolute; width: 110px; height: 26px;
    background: var(--tape);
    border-top: 1px dashed rgba(0,0,0,.15);
    border-bottom: 1px dashed rgba(0,0,0,.15);
  }
  .tape.t1{ top:-13px; left: 70px; transform: rotate(-6deg); }
  .tape.t2{ top:-13px; right: 90px; transform: rotate(5deg); background: var(--c6); }

  .hero h1{
    font-family: var(--f-display);
    font-size: 64px; line-height:1.05;
    margin: 0 0 14px;
    letter-spacing: .01em;
  }
  .hero h1 .wave{ display:inline-block; transform-origin: 70% 70%; }
  .hero .lead{
    font-family: var(--f-body);
    font-size: 18px; color: var(--ink-soft);
    margin: 0 0 22px;
    line-height: 1.55;
    max-width: 520px;
  }

  .facts{ display:flex; gap: 10px; flex-wrap:wrap; margin-bottom: 26px; }
  .fact{
    background: var(--bg);
    border: 2px dashed var(--ink);
    border-radius: 14px;
    padding: 10px 14px;
    font-size: 14px;
    font-weight: 600;
    display:flex; align-items:center; gap:8px;
  }
  .fact .emo{ font-size: 18px; }

  .hand-note{
    font-family: var(--f-hand);
    font-size: 28px;
    color: var(--c1);
    line-height: 1;
    margin: 4px 0 10px 6px;
    display:flex; align-items:center; gap:10px;
  }
  .arrow{
    width: 60px; height: 24px;
    stroke: var(--c1); stroke-width: 2.5; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }

  /* self portrait placeholder */
  .portrait{
    position: relative;
    aspect-ratio: 1/1;
    width: 100%;
    max-width: 360px;
    margin-left: auto;
  }
  .portrait .frame{
    position:absolute; inset: 0;
    background: var(--c2);
    border: 3px solid var(--ink);
    border-radius: 24px;
    box-shadow: 8px 8px 0 var(--ink);
    transform: rotate(3deg);
    overflow:hidden;
    background-image:
      repeating-linear-gradient(135deg, rgba(0,0,0,.05) 0 8px, transparent 8px 18px);
  }
  .portrait .frame::after{
    content:"";
    position:absolute; inset:14px;
    border:2px dashed rgba(0,0,0,.35);
    border-radius: 14px;
  }
  .portrait .frame .cap{
    position:absolute; left:50%; bottom: 18px; transform: translateX(-50%);
    font-family: var(--f-mono); font-size: 11px; color: rgba(0,0,0,.55);
    background: rgba(255,255,255,.7);
    padding: 5px 10px; border-radius: 999px;
    white-space: nowrap;
  }
  .portrait .face{
    position:absolute; inset: 18%;
    display:grid; place-items:center;
    font-size: 120px;
  }
  .sticker{
    position:absolute;
    font-size: 28px;
    background: white;
    border: 2.5px solid var(--ink);
    border-radius: 999px;
    width: 56px; height: 56px;
    display:grid; place-items:center;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .sticker.s1{ top:-12px; right: 20px; transform: rotate(12deg); }
  .sticker.s2{ bottom:-10px; left: 10px; transform: rotate(-10deg); background: var(--c4); }
  .sticker.s3{ bottom: 40px; right: -18px; transform: rotate(8deg); background: var(--c5); color:white; }

  /* ── section headings ─────────────────── */
  .section-head{
    display:flex; align-items:baseline; gap: 18px;
    margin: 0 6px 22px;
  }
  .sh-emoji{
    font-size: 44px;
    line-height: 1;
    transform: rotate(-6deg);
    display:inline-block;
  }
  .sh-title{
    font-family: var(--f-display);
    font-size: 36px;
    margin: 0;
  }
  .sh-count{
    font-family: var(--f-mono);
    font-size: 13px;
    color: var(--ink-soft);
    background: white;
    border: 2px solid var(--ink);
    border-radius: 999px;
    padding: 4px 10px;
    align-self: center;
  }
  .sh-rule{
    flex:1; height: 4px; border-radius: 2px;
    background: repeating-linear-gradient(90deg, var(--ink) 0 8px, transparent 8px 14px);
    align-self: center;
    opacity: .35;
  }

  /* ── grid of cards ────────────────────── */
  .grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 22px;
    margin-bottom: 56px;
  }

  /* sticker style card (default) */
  .card{
    position: relative;
    background: white;
    border: 3px solid var(--ink);
    border-radius: 22px;
    padding: 22px 20px 20px;
    cursor: pointer;
    box-shadow: 5px 5px 0 var(--ink);
    transition: transform .18s cubic-bezier(.2,.7,.3,1.4), box-shadow .18s ease;
    text-align: left;
    min-height: 200px;
    display:flex; flex-direction:column;
  }
  .card:hover{
    transform: translate(-2px,-4px) rotate(var(--tilt, 0deg));
    box-shadow: 8px 9px 0 var(--ink);
  }
  .card:active{
    transform: translate(2px,3px);
    box-shadow: 2px 2px 0 var(--ink);
  }
  .card-emoji{
    width: 64px; height: 64px;
    border-radius: 18px;
    background: var(--card-bg, var(--c2));
    border: 2.5px solid var(--ink);
    display:grid; place-items:center;
    font-size: 36px; line-height: 1;
    margin-bottom: 14px;
    box-shadow: 3px 3px 0 var(--ink);
  }
  .card h3{
    font-family: var(--f-display);
    font-size: 22px;
    margin: 0 0 6px;
    letter-spacing: .01em;
  }
  .card p{
    font-size: 14px;
    color: var(--ink-soft);
    margin: 0;
    line-height: 1.5;
  }
  .card .date{
    margin-top: auto;
    padding-top: 14px;
    font-family: var(--f-mono);
    font-size: 11px;
    color: var(--ink-soft);
    display:flex; align-items:center; justify-content: space-between;
  }
  .card .go{
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--card-bg, var(--c2));
    border: 2px solid var(--ink);
    display:grid; place-items:center;
    font-size: 14px; line-height: 1;
    transition: transform .2s ease;
  }
  .card:hover .go{ transform: translateX(3px); }

  /* tilt each card slightly */
  .card:nth-child(4n+1){ --tilt: -1.2deg; }
  .card:nth-child(4n+2){ --tilt: 1.1deg; }
  .card:nth-child(4n+3){ --tilt: -.6deg; }
  .card:nth-child(4n+4){ --tilt: 1.4deg; }
  .grid.no-tilt .card{ --tilt: 0deg !important; }

  /* "new" sticker */
  .card .badge{
    position:absolute; top:-12px; right: -10px;
    background: var(--c1);
    color: white;
    font-family: var(--f-display);
    font-size: 14px;
    padding: 5px 10px;
    border: 2.5px solid var(--ink);
    border-radius: 999px;
    transform: rotate(8deg);
    box-shadow: 2px 2px 0 var(--ink);
  }

  /* "add a new project" card */
  .card.add{
    background: transparent;
    border-style: dashed;
    box-shadow: none;
    color: var(--ink-soft);
    display:flex; align-items:center; justify-content:center;
    text-align:center;
    min-height: 200px;
  }
  .card.add:hover{
    background: white;
    box-shadow: 5px 5px 0 var(--ink);
    color: var(--ink);
  }
  .card.add .plus{
    font-size: 44px; line-height: 1; margin-bottom: 8px;
    font-family: var(--f-display);
  }
  .card.add h3{ font-size: 18px; margin-bottom: 4px; }
  .card.add p{ font-size: 12px; font-family: var(--f-mono); }

  /* ── BLOCKS theme variants ────────────── */
  body.theme-blocks .card{
    border-radius: 14px;
    border-width: 0;
    box-shadow:
      0 4px 0 color-mix(in oklab, var(--card-bg, var(--c2)) 60%, black),
      0 14px 24px -8px rgba(0,0,0,.18);
    background: var(--card-bg, var(--c2));
    color: white;
  }
  body.theme-blocks .card p{ color: rgba(255,255,255,.85); }
  body.theme-blocks .card .date{ color: rgba(255,255,255,.7); }
  body.theme-blocks .card-emoji{
    background: rgba(255,255,255,.25);
    border: 0;
    box-shadow: none;
    backdrop-filter: blur(2px);
  }
  body.theme-blocks .card .go{
    background: white; border: 0; color: var(--ink);
  }
  body.theme-blocks .card:hover{
    transform: translateY(-4px) rotate(0deg) !important;
    box-shadow:
      0 6px 0 color-mix(in oklab, var(--card-bg, var(--c2)) 60%, black),
      0 22px 36px -10px rgba(0,0,0,.25);
  }
  body.theme-blocks .hero,
  body.theme-blocks .pill,
  body.theme-blocks .fact,
  body.theme-blocks .sh-count{
    box-shadow: 0 4px 0 rgba(0,0,0,.12);
    border-color: transparent;
  }
  body.theme-blocks .hero{
    border: 0;
    box-shadow: 0 8px 0 rgba(0,0,0,.06), 0 30px 60px -20px rgba(0,0,0,.18);
  }
  body.theme-blocks .portrait .frame{
    box-shadow: 0 8px 0 color-mix(in oklab, var(--c2) 60%, black);
    transform: rotate(0deg);
  }
  body.theme-blocks .tape{ display:none; }
  body.theme-blocks .sticker{ box-shadow: 0 4px 0 rgba(0,0,0,.2); border: 0; }
  body.theme-blocks .brand-mark{
    border: 0;
    box-shadow: 0 4px 0 color-mix(in oklab, var(--c2) 60%, black);
    transform: rotate(0deg);
  }

  /* ── footer ────────────────────────────── */
  .footer{
    margin-top: 40px;
    padding-top: 26px;
    border-top: 3px dashed var(--paper-line);
    display:flex; justify-content:space-between; align-items:center;
    font-family: var(--f-mono);
    font-size: 12px;
    color: var(--ink-soft);
  }
  .footer .heart{ color: var(--c1); }

  /* ── splash modal when a card is clicked ─ */
  .splash{
    position: fixed; inset: 0;
    background: rgba(42,38,34,.55);
    display:grid; place-items:center;
    z-index: 9999;
    animation: fadeIn .18s ease;
    backdrop-filter: blur(4px);
  }
  .splash .card-big{
    width: min(520px, 92vw);
    background: white;
    border: 3px solid var(--ink);
    border-radius: 28px;
    padding: 36px 32px;
    box-shadow: 10px 10px 0 var(--ink);
    text-align: center;
    transform-origin: center;
    animation: popIn .25s cubic-bezier(.2,.8,.3,1.5);
  }
  .splash .ce{
    width: 96px; height: 96px;
    border-radius: 28px;
    background: var(--card-bg, var(--c2));
    border: 2.5px solid var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    display:grid; place-items:center;
    font-size: 52px;
    margin: 0 auto 18px;
  }
  .splash h2{ font-family: var(--f-display); font-size: 30px; margin: 0 0 6px; }
  .splash p{ color: var(--ink-soft); margin: 0 0 22px; }
  .splash .url{
    font-family: var(--f-mono); font-size: 13px;
    background: var(--bg);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 20px;
    color: var(--ink);
    border: 2px dashed var(--ink);
    word-break: break-all;
  }
  .splash button{
    appearance:none; font: inherit;
    font-family: var(--f-display);
    font-size: 18px;
    padding: 12px 22px;
    border-radius: 999px;
    border: 2.5px solid var(--ink);
    background: var(--c2);
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
  }
  .splash button:hover{ transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--ink); }
  .splash button:active{ transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  @keyframes popIn{ from{ transform: scale(.7); opacity:0 } to{ transform: scale(1); opacity:1 } }

  /* idle wave on hero hand */
  @keyframes wave{
    0%, 60%, 100% { transform: rotate(0deg); }
    10%, 30% { transform: rotate(18deg); }
    20% { transform: rotate(-10deg); }
    40% { transform: rotate(12deg); }
  }
  .wave{ animation: wave 3.4s ease-in-out infinite; }

  /* gentle wiggle for stickers */
  @keyframes wiggle{
    0%,100%{ transform: rotate(var(--r, 0deg)); }
    50%{ transform: rotate(calc(var(--r, 0deg) + 4deg)); }
  }
  .sticker.s1{ --r: 12deg; animation: wiggle 5s ease-in-out infinite; }
  .sticker.s2{ --r: -10deg; animation: wiggle 6s ease-in-out infinite .8s; }
  .sticker.s3{ --r: 8deg; animation: wiggle 5.4s ease-in-out infinite 1.6s; }

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="homepage-app.jsx"></script>
</body>
</html>
